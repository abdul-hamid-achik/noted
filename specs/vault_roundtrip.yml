version: 1
name: noted_vault_roundtrip
intent: |
  The markdown vault is the source of truth: `vault export` writes every note to .md files, then
  deleting the database and running `vault import --force` rebuilds the index from those files
  while preserving the note id.
target:
  cmd: ["/bin/sh", "-c", "set -e; ./noted --db /tmp/noted-rt.db --vault /tmp/noted-rt-vault vault export; rm -f /tmp/noted-rt.db /tmp/noted-rt.db-journal /tmp/noted-rt.db-wal /tmp/noted-rt.db-shm; ./noted --db /tmp/noted-rt.db --vault /tmp/noted-rt-vault vault import --force; ./noted --db /tmp/noted-rt.db --vault /tmp/noted-rt-vault show 1 --raw"]
  cwd: "."
terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: forbid
steps: []
outcomes:
  - id: export_reported
    description: vault export reports it wrote the note to the vault directory
    verify:
      screen:
        contains: "Exported 1 notes"
  - id: import_reported
    description: vault import --force reports a successful rebuild
    verify:
      screen:
        contains: "Rebuilt index"
  - id: rebuilt_content_preserved
    description: the rebuilt note still contains its original body
    verify:
      screen:
        contains: "Seeded for the vault round-trip glyph spec"
  - id: clean_exit
    description: the round-trip commands exit successfully
    verify:
      process:
        exitCode: 0
