version: 1
name: noted_cli_pin
intent: |
  The CLI `pin` and `unpin` commands toggle a note's pinned state and emit JSON when asked; the
  list command shows the note after it is pinned.
target:
  cmd: ["/bin/sh", "-c", "./noted --db /tmp/noted-cli.db pin 1 --json; ./noted --db /tmp/noted-cli.db unpin 1 --json; ./noted --db /tmp/noted-cli.db pin 1; ./noted --db /tmp/noted-cli.db list"]
  cwd: "."
terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: forbid
steps: []
outcomes:
  - id: pin_json_emitted
    description: pin --json prints JSON containing pinned=true
    verify:
      screen:
        contains: '"pinned": true'
  - id: unpin_json_emitted
    description: unpin --json prints JSON containing pinned=false
    verify:
      screen:
        contains: '"pinned": false'
  - id: list_shows_pinned_note
    description: list shows the pinned note with a pin marker
    verify:
      screen:
        contains: "📌 CLI pin target"
  - id: clean_exit
    description: the combined CLI commands exit successfully
    verify:
      process:
        exitCode: 0
