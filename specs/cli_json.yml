version: 1
name: noted_cli_json
intent: |
  CLI commands support a --json flag for scripting; `list` and `stats` return valid JSON containing
  the seeded notes.
target:
  cmd: ["/bin/sh", "-c", "./noted --db /tmp/noted-e2e.db list --json; ./noted --db /tmp/noted-e2e.db stats --json"]
  cwd: "."
terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: forbid
steps: []
outcomes:
  - id: list_json_emitted
    description: list --json prints a JSON array with the seeded notes
    verify:
      screen:
        contains: '"Welcome to noted"'
  - id: stats_json_emitted
    description: stats --json prints a JSON object with note count
    verify:
      screen:
        contains: '"notes"'
  - id: clean_exit
    description: the combined CLI commands exit successfully
    verify:
      process:
        exitCode: 0
