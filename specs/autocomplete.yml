version: 1
name: noted_autocomplete
intent: |
  Typing [[ in the editor opens wikilink autocomplete; choosing a suggestion inserts [[Title]].
target:
  cmd: ["./noted", "--db", "/tmp/noted-e2e.db", "--vault", "/tmp/noted-e2e-vault"]
  cwd: "."
terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: require
steps:
  - wait: { screen: { contains: "Welcome to noted" }, timeoutMs: 8000 }
  - press: "n"                                                   # new note (title focused)
  - type: "Linker"
  - press: "tab"                                                # focus content
  - type: "see [[Meet"                                          # [[ triggers autocomplete
  - wait: { screen: { contains: "Meeting notes" }, timeoutMs: 3000 }   # suggestion strip
  - snapshot: autocomplete
  - press: "tab"                                                # accept the suggestion
  - wait: { screen: { contains: "[[Meeting notes]]" }, timeoutMs: 3000 }   # inserted
  - press: "ctrl+s"
  - wait: { screen: { contains: "saved" }, timeoutMs: 3000 }
  - press: "esc"
  - wait: { screen: { contains: "n new" }, timeoutMs: 3000 }    # notes footer (editor footer lacks it)
  - press: "q"
  - wait: { process: { exited: true }, timeoutMs: 5000 }
outcomes:
  - id: link_inserted
    description: autocomplete inserted a wikilink and we saved + returned to the list
    verify: { screen: { contains: "Welcome to noted" } }
  - id: clean_exit
    description: app exits 0 on quit
    verify: { process: { exitCode: 0 } }
